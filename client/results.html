<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - Athar | استلام النتائج</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .results-container { padding: 120px 8% 50px; min-height: 100vh; text-align: center; }
        .search-box { max-width: 600px; margin: 4rem auto; padding: 3rem; border-radius: 30px; }
        .result-card { background: var(--athar-glass); padding: 3rem; border-radius: 40px; margin-top: 3rem; border: 1px solid var(--athar-border); }
        .result-video { width: 100%; border-radius: 20px; aspect-ratio: 16/9; background: #000; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav id="main-nav" class="scrolled">
        <div class="logo">
            <div class="logo-icon">أ</div>
            <h2 id="brand-name">أثر</h2>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li id="auth-section">
                <button onclick="openLoginModal()" class="btn btn-secondary" style="padding: 0.7rem 1.5rem; font-size: 0.8rem;">دخول / تسجيل</button>
            </li>
            <li id="user-profile" style="display: none; cursor: pointer; position: relative;" onclick="toggleUserDropdown()">
                <div style="display: flex; align-items: center; gap: 10px;">
                   <span id="user-name" style="font-size: 0.8rem; font-weight: 700;">..</span>
                   <div id="user-avatar" style="width: 35px; height: 35px; border-radius: 50%; background: var(--athar-orange); border: 2px solid white; overflow: hidden;">
                      <img id="user-photo" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                   </div>
                </div>
                <!-- User Dropdown -->
                <div id="user-dropdown" class="glass" style="display: none; position: absolute; top: 50px; left: 0; min-width: 150px; padding: 1rem; border-radius: 15px; text-align: center; border: 1px solid var(--athar-border);">
                    <button onclick="logout()" style="background: none; border: none; color: #ff4d4d; font-family: 'Cairo'; cursor: pointer; font-weight: 700;">تسجيل الخروج</button>
                </div>
            </li>
        </ul>
    </nav>

    <main class="results-container">
        <h1>نتائجك السينمائية</h1>
        <p>شاهد فيديوهاتك وحمل نتاج أعمالنا بمجرد اكتمالها في لوحتك الخاصة.</p>

        <div id="auth-check-msg" style="margin-top: 3rem; display: none;">
            <p style="opacity: 0.7; margin-bottom: 2rem;">يرجى تسجيل الدخول لمشاهدة طلباتك ونتائجك السينمائية.</p>
            <button onclick="openLoginModal()" class="btn btn-primary">تسجيل الدخول الآن</button>
        </div>

        <div id="loading-results" style="display: none; margin-top: 3rem;">
            <p>جاري تحميل نتائجك...</p>
        </div>

        <div id="results-list" class="reveal">
            <!-- Results will show here -->
        </div>
    </main>

    <!-- Login Modal -->
    <div id="login-modal" style="display: none; position: fixed; inset: 0; z-index: 2000; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);">
        <div class="form-card glass" style="max-width: 450px; padding: 3rem; text-align: center; border: 1px solid var(--athar-orange);">
            <h2 style="margin-bottom: 1.5rem; color: var(--athar-orange);">مرحباً في أثر</h2>
            <p style="margin-bottom: 2.5rem; opacity: 0.6; font-size: 0.9rem;">سجل دخولك لمتابعة طلباتك واستلام فيديوهاتك السينمائية.</p>
            
            <div id="google-btn-container" style="width: 100%; margin-bottom: 2rem;"></div>
            
            <div style="margin: 1.5rem 0; opacity: 0.3; font-size: 0.8rem;">أو عبر البريد الإلكتروني</div>
            
            <input type="email" id="login-email" class="input-field" placeholder="البريد الإلكتروني" style="margin-bottom: 1rem; padding: 1rem;">
            <button onclick="loginWithEmail()" class="btn btn-primary" style="width: 100%; padding: 1rem;">استمرار</button>
            
            <button onclick="closeLoginModal()" style="background: none; border: none; color: white; margin-top: 2rem; cursor: pointer; opacity: 0.5;">إغلاق</button>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth-config.js"></script>
    <script src="results-script.js"></script>
</body>
</html>
